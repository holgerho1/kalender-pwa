<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material-Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; margin: 15px; background-color: #f0f2f5; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        h1 { font-size: 1.3rem; color: #1a1a1a; margin-bottom: 20px; text-align: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        
        .nav-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-nav { flex: 1; padding: 10px; border: none; border-radius: 6px; background: #eef2f7; color: #333; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .btn-nav.active { background: #007bff; color: white; }

        .section { display: none; background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
        .section.active { display: block; }

        label { display: block; font-size: 0.75rem; font-weight: bold; color: #555; margin-top: 15px; margin-bottom: 5px; text-transform: uppercase; }
        
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        
        .btn-save { background: #28a745; color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        
        .list-container { margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; }
        .list-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem;
        }
        .list-item:last-child { border-bottom: none; }
        
        .item-info { display: flex; flex-direction: column; gap: 2px; }
        .item-main { font-weight: bold; color: #333; }
        .item-sub { font-size: 0.75rem; color: #007bff; font-weight: bold; }

        #status { font-size: 0.75rem; color: #888; text-align: center; margin-top: 20px; font-style: italic; }

        .dn-row { display: flex; gap: 8px; }
        .dn-row div { flex: 1; }

        /* MODAL STYLES */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 20px; border-radius: 12px; width: 85%; max-width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .modal-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-modal-save { background: #28a745; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-modal-del { background: #dc3545; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-modal-cancel { background: #6c757d; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="window.location.href='index.html'" style="background:none; border:none; color:#007bff; cursor:pointer; font-weight:bold; margin-bottom:15px;">⬅ Zurück zur Übersicht</button>
    
    <h1>Stammdaten Verwaltung</h1>

    <div class="nav-btns">
        <button class="btn-nav active" onclick="showSection('sec-mat')">Materialien</button>
        <button class="btn-nav" onclick="showSection('sec-dn')">Nennweiten</button>
        <button class="btn-nav" onclick="showSection('sec-kat')">Kategorien</button>
    </div>

    <div id="sec-mat" class="section active">
        <label>Neues Material Name</label>
        <input type="text" id="matName" placeholder="z.B. KG-Rohr">
        <label>Einheit</label>
        <input type="text" id="matUnit" placeholder="z.B. m, Stk, Rollen">
        <label>Kategorie zuordnen</label>
        <select id="matKatSelect"></select>
        <button class="btn-save" onclick="saveMaterial()">Material Speichern</button>
        <div class="list-container" id="matList"></div>
    </div>

    <div id="sec-dn" class="section">
        <div class="dn-row">
            <div><label>Typ</label><input type="text" id="dnTyp" placeholder="KG"></div>
            <div><label>Wert</label><input type="text" id="dnWert" placeholder="110"></div>
            <div><label>Gruppe</label><input type="text" id="dnGruppe" placeholder="Abwasser"></div>
        </div>
        <label>Material zuordnen (Optional)</label>
        <select id="dnMatSelect"><option value="">-- Nur global anlegen --</option></select>
        <button class="btn-save" onclick="saveDN()">Nennweite Speichern</button>
        <div class="list-container" id="dnList"></div>
    </div>

    <div id="sec-kat" class="section">
        <label>Neue Kategorie</label>
        <input type="text" id="katName" placeholder="z.B. Tiefbau">
        <button class="btn-save" onclick="saveCategory()">Kategorie Speichern</button>
        <div class="list-container" id="katList"></div>
    </div>

    <div id="status">Bereit</div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-top:0;">Eintrag bearbeiten</h3>
        <label>Bezeichnung</label>
        <input type="text" id="editInput">
        <div class="modal-btns">
            <button id="btnSaveEdit" class="btn-modal-save">Speichern</button>
            <button id="btnDeleteConfirm" class="btn-modal-del">Löschen</button>
            <button onclick="window.closeModal()" class="btn-modal-cancel">Abbrechen</button>
        </div>
    </div>
</div>

<script type="module" src="admin.js"></script>

<script>
    window.showSection = function(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }
</script>

</body>
</html>
