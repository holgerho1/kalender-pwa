<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material-Katalog Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; margin: 15px; background-color: #f4f7f6; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { font-size: 1.2rem; text-align: center; color: #333; margin-bottom: 20px; }
        .section { background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 25px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }
        label { display: block; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; color: #555; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        
        /* Checkbox-Liste Style */
        #katCheckboxContainer { 
            background: #fafafa; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            padding: 10px; 
            max-height: 200px; 
            overflow-y: auto; 
            margin-bottom: 15px; 
        }
        .check-item { display: flex; align-items: center; margin-bottom: 8px; padding: 5px 0; border-bottom: 1px hidden #eee; }
        .check-item input { width: 22px; height: 22px; margin: 0 12px 0 0; cursor: pointer; }
        .check-item label { display: inline; font-size: 1rem; text-transform: none; color: #333; margin: 0; cursor: pointer; }

        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 5px; }
        .btn-save-mat { background: #28a745; }
        .btn-back { background: #6c757d; margin-bottom: 15px; width: auto; font-size: 0.85rem; padding: 8px 15px; }
        #status { font-size: 0.8rem; text-align: center; color: #007bff; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="window.location.href='index.html'" class="btn-back">⬅ Startseite</button>
    <h1>Stammdaten-Pflege</h1>
    
    <div id="status">Lade Daten...</div>

    <div class="section">
        <label>Neue Kategorie anlegen</label>
        <input type="text" id="newKatName" placeholder="z.B. Rohbau, Elektro, Garten">
        <button id="btnSaveKat">Kategorie hinzufügen</button>
    </div>

    <div class="section">
        <label>Kategorie(n) wählen</label>
        <div id="katCheckboxContainer">
            <span style="color:#999; font-size:0.8rem;">Lade Kategorien...</span>
        </div>

        <label>Material-Details</label>
        <input type="text" id="newMatName" placeholder="Name (z.B. KG-Rohr DN110)">
        <input type="text" id="newMatUnit" placeholder="Einheit (z.B. m, Stk, Sack)">
        
        <button id="btnSaveMat" class="btn-save-mat">Im Katalog speichern</button>
    </div>
</div>

<script type="module" src="admin.js"></script>

</body>
</html>
