<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Native Viewer</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            margin: 0; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            height: 100vh; background: #121212; color: white;
        }
        
        .card {
            background: #1e1e1e; padding: 40px; border-radius: 24px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 80%; max-width: 320px;
        }

        .icon { font-size: 60px; margin-bottom: 20px; }

        button { 
            width: 100%; padding: 18px; background: #007bff; color: white; 
            border: none; border-radius: 14px; font-weight: bold; 
            font-size: 18px; cursor: pointer;
        }

        button:active { background: #0056b3; transform: scale(0.98); }

        #status { margin-top: 20px; font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">📄</div>
        <button onclick="viewPdfNative()">PDF ANZEIGEN</button>
        <div id="status">Bereit</div>
    </div>

    <script>
        async function viewPdfNative() {
            const status = document.getElementById('status');
            const projectID = 'hzsgocmulzcxllihkmmh';
            const apiKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6c2dvY211bHpjeGxsaWhrbW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTM0MDIsImV4cCI6MjA4Nzc4OTQwMn0.-A9neQ2MqCyYYDsyGMTrOjdjBk_UrKKP5BQIs17UFJw';
            const url = `https://${projectID}.supabase.co/storage/v1/object/authenticated/test-pdfs/test.pdf`;

            try {
                status.innerText = "Lade Dokument...";
                
                // 1. Datei von Supabase holen
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'apikey': apiKey,
                        'Authorization': `Bearer ${apiKey}`
                    }
                });

                if (!response.ok) throw new Error("Fehler beim Abrufen.");

                const blob = await response.blob();
                
                // 2. WICHTIG: Blob-Typ explizit auf PDF setzen
                const pdfBlob = new Blob([blob], { type: 'application/pdf' });
                const blobUrl = URL.createObjectURL(pdfBlob);

                // 3. Den Browser anweisen, die Datei im aktuellen Fenster zu öffnen
                // Das löst auf fast allen Handys den internen PDF-Viewer aus
                window.location.href = blobUrl;

            } catch (err) {
                status.innerText = "Fehler: " + err.message;
            }
        }
    </script>
</body>
</html>
