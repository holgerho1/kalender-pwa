<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PDF Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; }
        
        .header { 
            position: sticky; top: 0; background: #222; padding: 10px; 
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; border-bottom: 1px solid #333;
        }

        .btn { background: #007aff; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; }
        
        /* Der Viewport lässt natürliches Scrollen und Zoomen zu */
        #viewport { 
            width: 100%; display: flex; justify-content: center; padding-top: 10px;
        }

        canvas { 
            background: white; max-width: 95%; height: auto !important; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="btn" onclick="changePage(-1)">Zurück</button>
        <span id="page-info">Lädt...</span>
        <button class="btn" onclick="changePage(1)">Weiter</button>
    </div>

    <div id="viewport">
        <canvas id="pdf-render"></canvas>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null, pageNum = 1;
        const canvas = document.getElementById('pdf-render');
        const ctx = canvas.getContext('2d');

        const url = 'https://hzsgocmulzcxllihkmmh.supabase.co/storage/v1/object/authenticated/test-pdfs/test.pdf';
        const key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6c2dvY211bHpjeGxsaWhrbW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTM0MDIsImV4cCI6MjA4Nzc4OTQwMn0.-A9neQ2MqCyYYDsyGMTrOjdjBk_UrKKP5BQIs17UFJw';

        async function renderPage(num) {
            const page = await pdfDoc.getPage(num);
            // Hohe Auflösung (2.0) direkt beim Laden, damit der Browser-Zoom scharf bleibt
            const viewport = page.getViewport({ scale: 2.0 });
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            document.getElementById('page-info').innerText = `Seite ${num} / ${pdfDoc.numPages}`;
        }

        function changePage(delta) {
            const next = pageNum + delta;
            if (pdfDoc && next >= 1 && next <= pdfDoc.numPages) {
                pageNum = next;
                renderPage(pageNum);
                window.scrollTo(0, 0);
            }
        }

        fetch(url, { headers: { 'apikey': key, 'Authorization': `Bearer ${key}` } })
            .then(res => res.arrayBuffer())
            .then(data => pdfjsLib.getDocument({ data }).promise)
            .then(doc => { pdfDoc = doc; renderPage(pageNum); });
    </script>
</body>
</html>
