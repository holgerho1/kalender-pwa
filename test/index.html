<script>
    // ... (Rest des Codes bleibt gleich)

    async function fetchFiles() {
        const listContainer = document.getElementById('file-list');
        // WICHTIG: Die URL zum Auflisten ist /list/ + Bucket-Name
        const url = `https://${config.id}.supabase.co/storage/v1/list/${config.bucket}`;

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 
                    'apikey': config.key, 
                    'Authorization': `Bearer ${config.key}`, 
                    'Content-Type': 'application/json' 
                },
                // Wir fragen nach Dateien ohne Unterordner ("")
                body: JSON.stringify({ 
                    path: "", 
                    limit: 100, 
                    sortBy: { column: 'name', order: 'asc' } 
                })
            });

            if (!res.ok) throw new Error("Zugriff verweigert (RLS prüfen)");

            const files = await res.json();
            listContainer.innerHTML = '<div style="font-size: 11px; color: #666; margin-bottom: 5px;">DATEIEN</div>';

            if (files.length === 0) {
                listContainer.innerHTML += '<div style="color:orange; font-size:12px;">Keine Dateien gefunden. RLS-Policy gesetzt?</div>';
                return;
            }

            files.forEach((file, index) => {
                // Wir filtern nur echte PDF-Dateien (keine Ordner)
                if (file.name && file.name.toLowerCase().endsWith('.pdf')) {
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    item.innerText = file.name;
                    item.onclick = () => {
                        document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                        loadFile(file.name);
                    };
                    listContainer.appendChild(item);
                    if (index === 0) item.click();
                }
            });
        } catch (e) {
            listContainer.innerHTML = `<div style="color:red; font-size:12px;">Fehler: ${e.message}</div>`;
        }
    }

    // ... (Rest des Scripts)
</script>
