<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profi PDF Viewer</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        
        .nav { 
            height: 60px; background: #222; display: flex; 
            align-items: center; justify-content: center; border-bottom: 1px solid #333;
        }

        button { 
            padding: 12px 24px; background: #007bff; color: white; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        /* Das PDF füllt den restlichen Platz komplett aus */
        #viewer-container { 
            height: calc(100% - 60px); width: 100%; border: none; 
        }

        iframe { width: 100%; height: 100%; border: none; }
        
        #status { color: #888; font-size: 14px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="nav">
        <button onclick="getAccessAndShow()">PDF ÖFFNEN</button>
    </div>

    <div id="viewer-container">
        <div id="status">Klicke auf den Button, um das Dokument sicher zu laden.</div>
    </div>

    <script>
        async function getAccessAndShow() {
            const status = document.getElementById('status');
            const container = document.getElementById('viewer-container');
            
            const projectID = 'hzsgocmulzcxllihkmmh';
            const apiKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6c2dvY211bHpjeGxsaWhrbW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTM0MDIsImV4cCI6MjA4Nzc4OTQwMn0.-A9neQ2MqCyYYDsyGMTrOjdjBk_UrKKP5BQIs17UFJw';
            
            const endpoint = `https://${projectID}.supabase.co/storage/v1/object/sign/test-pdfs/test.pdf`;

            try {
                status.innerText = "Autorisierung läuft...";

                // Wir holen uns eine temporäre URL (gültig für 15 Minuten)
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'apikey': apiKey,
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ expiresIn: 900 })
                });

                if (!response.ok) throw new Error("Zugriff verweigert");

                const data = await response.json();
                const signedUrl = `https://${projectID}.supabase.co${data.signedURL}`;

                // Jetzt betten wir die PDF direkt ein. 
                // Moderne Handy-Browser öffnen hier ihren nativen, super-flüssigen Viewer.
                container.innerHTML = `<iframe src="${signedUrl}#view=FitH"></iframe>`;

            } catch (err) {
                status.innerText = "Fehler: " + err.message;
            }
        }
    </script>
</body>
</html>
