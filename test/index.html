<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PDF Archiv Complete</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { --bg: #121212; --sidebar: #1e1e1e; --accent: #007bff; --text: #ffffff; --border: #333; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .top-nav { background: var(--sidebar); padding: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 20; }
        
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar mit Upload unten */
        #sidebar { 
            width: 140px; background: var(--sidebar); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; 
        }
        
        #file-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        
        .upload-section { padding: 10px; border-top: 1px solid var(--border); background: #181818; }
        
        @media (max-width: 600px) { #sidebar { width: 100px; } .btn-upload { font-size: 10px !important; } }

        .file-item { padding: 10px; background: #2c2c2e; border-radius: 8px; cursor: pointer; font-size: 11px; word-break: break-all; color: #ccc; border: 1px solid transparent; }
        .file-item.active { border-color: var(--accent); background: #3a3a3c; color: white; }

        .viewer-area { flex: 1; display: flex; flex-direction: column; background: #2c2c2e; position: relative; }
        #viewer-container { flex: 1; overflow: auto; display: flex; justify-content: center; align-items: flex-start; padding: 10px; -webkit-overflow-scrolling: touch; }
        canvas { background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.6); max-width: 100%; height: auto !important; }

        .btn { background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; }
        .btn-upload { background: #555; width: 100%; padding: 10px; font-size: 11px; }
        .btn-full { background: #28a745; }
        
        #page-info { font-size: 12px; color: #888; }
        #error-display { color: #ff4444; font-size: 11px; padding: 10px; background: rgba(255,0,0,0.1); display: none; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div style="display: flex; gap: 6px; align-items: center;">
            <button class="btn" id="prevBtn" onclick="changePage(-1)"> < </button>
            <span id="page-info">...</span>
            <button class="btn" id="nextBtn" onclick="changePage(1)"> > </button>
        </div>
        <button class="btn btn-full" onclick="openNativeViewer()">VOLLBILD ↗</button>
    </div>

    <div class="main-layout">
        <div id="sidebar">
            <div id="file-list"><div style="font-size: 10px; color: #666;">LADE...</div></div>
            
            <div class="upload-section">
                <input type="file" id="fileInput" accept="application/pdf" style="display: none;" onchange="handleUpload(this)">
                <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">+ PDF HOCHLADEN</button>
            </div>
        </div>

        <div class="viewer-area">
            <div id="error-display"></div>
            <div id="viewer-container"><canvas id="pdf-render"></canvas></div>
        </div>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null, pageNum = 1, isRendering = false, currentBlob = null;
        const canvas = document.getElementById('pdf-render');
        const ctx = canvas.getContext('2d', { alpha: false });

        const config = {
            id: 'hzsgocmulzcxllihkmmh',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6c2dvY211bHpjeGxsaWhrbW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTM0MDIsImV4cCI6MjA4Nzc4OTQwMn0.-A9neQ2MqCyYYDsyGMTrOjdjBk_UrKKP5BQIs17UFJw',
            bucket: 'test-pdfs'
        };

        async function fetchFiles() {
            const listContainer = document.getElementById('file-list');
            const url = `https://${config.id}.supabase.co/storage/v1/object/list/${config.bucket}`;
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'apikey': config.key, 'Authorization': `Bearer ${config.key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prefix: "" })
                });
                const files = await res.json();
                renderFileList(files);
            } catch (e) { document.getElementById('error-display').innerText = "Fehler beim Laden der Liste."; }
        }

        function renderFileList(files) {
            const listContainer = document.getElementById('file-list');
            listContainer.innerHTML = '<div style="font-size: 10px; color: #666; margin-bottom: 5px;">DATEIEN</div>';
            const pdfs = files.filter(f => f.name && f.name.toLowerCase().endsWith('.pdf'));
            pdfs.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerText = file.name;
                item.onclick = () => {
                    document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    loadFile(file.name);
                };
                listContainer.appendChild(item);
            });
        }

        async function loadFile(name) {
            const fileUrl = `https://${config.id}.supabase.co/storage/v1/object/authenticated/${config.bucket}/${name}`;
            try {
                const res = await fetch(fileUrl, { headers: { 'apikey': config.key, 'Authorization': `Bearer ${config.key}` } });
                const data = await res.arrayBuffer();
                currentBlob = new Blob([data], { type: 'application/pdf' });
                pdfDoc = await pdfjsLib.getDocument({ data }).promise;
                pageNum = 1;
                renderPage(pageNum);
            } catch (e) { console.error("Ladefehler"); }
        }

        async function handleUpload(input) {
            if (!input.files || input.files.length === 0) return;
            const file = input.files[0];
            const uploadUrl = `https://${config.id}.supabase.co/storage/v1/object/${config.bucket}/${file.name}`;
            
            const btn = document.querySelector('.btn-upload');
            const oldText = btn.innerText;
            btn.innerText = "LÄDT...";
            btn.disabled = true;

            try {
                const res = await fetch(uploadUrl, {
                    method: 'POST',
                    headers: { 'apikey': config.key, 'Authorization': `Bearer ${config.key}` },
                    body: file
                });
                if (!res.ok) throw new Error("Upload fehlgeschlagen");
                await fetchFiles(); // Liste aktualisieren
                alert("Erfolgreich hochgeladen!");
            } catch (e) { alert(e.message); }
            finally { btn.innerText = oldText; btn.disabled = false; input.value = ''; }
        }

        async function renderPage(num) {
            if (isRendering || !pdfDoc) return;
            isRendering = true;
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale: 1.5 });
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            document.getElementById('page-info').innerText = `${num} / ${pdfDoc.numPages}`;
            document.getElementById('prevBtn').disabled = (num <= 1);
            document.getElementById('nextBtn').disabled = (num >= pdfDoc.numPages);
            isRendering = false;
            pageNum = num;
        }

        function changePage(delta) {
            const next = pageNum + delta;
            if (pdfDoc && next >= 1 && next <= pdfDoc.numPages) renderPage(next);
        }

        function openNativeViewer() {
            if (currentBlob) window.location.href = URL.createObjectURL(currentBlob);
        }

        window.onload = fetchFiles;
    </script>
</body>
</html>
