<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hybrid Archiv Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { 
            --bg: #f5f5f7; 
            --sidebar: #ffffff; 
            --accent: #007aff; 
            --text: #1d1d1f; 
            --border: #d2d2d7; 
            --item-bg: #f2f2f7;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; background: var(--bg); color: var(--text); 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }
        
        /* Obere Leiste - Fixiert */
        .top-nav { 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 10px 15px; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; z-index: 100; 
        }
        
        .main-layout { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 60px); }
        
        /* Sidebar - Flüssiges Scrollen */
        #sidebar { 
            width: 170px; background: var(--sidebar); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; height: 100%; 
        }
        
        .sidebar-header { padding: 15px 12px 5px 12px; font-size: 11px; color: #86868b; font-weight: 600; text-transform: uppercase; }

        #file-list { 
            flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; 
            -webkit-overflow-scrolling: touch; touch-action: pan-y;
        }
        
        @media (max-width: 600px) { #sidebar { width: 120px; } }

        .file-item { 
            padding: 12px 10px; background: var(--item-bg); border-radius: 10px; cursor: pointer; 
            font-size: 12px; word-break: break-all; color: var(--text); border: 1px solid transparent; 
            display: flex; align-items: center; gap: 8px; transition: all 0.1s ease;
        }
        .file-item.active { border-color: var(--accent); background: #e8f2ff; color: var(--accent); font-weight: 600; }
        .file-icon { font-size: 1.3em; }

        /* Viewer Bereich - Optimiert für Zoom/Scroll */
        .viewer-area { flex: 1; display: flex; flex-direction: column; background: #e5e5e5; position: relative; overflow: hidden; }
        
        #viewer-container { 
            flex: 1; overflow: auto; display: block; padding: 20px; 
            -webkit-overflow-scrolling: touch; text-align: center;
        }
        
        canvas, #image-render { 
            background: white; box-shadow: 0 8px 30px rgba(0,0,0,0.12); 
            max-width: 100%; height: auto !important; border-radius: 4px; 
            display: none; margin: 0 auto; 
        }

        #pdf-nav { display: flex; gap: 10px; align-items: center; }

        /* Buttons & UI */
        .btn { border: none; padding: 10px 16px; border-radius: 10px; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-nav { background: #e8e8ed; color: var(--text); min-width: 40px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: #34c759; color: white; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        
        #page-info { font-size: 13px; font-weight: 600; min-width: 50px; text-align: center; color: #444; }
        #error-display { color: #ff3b30; font-size: 12px; padding: 10px; background: #fff2f2; border-bottom: 1px solid #ffdbdb; display: none; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div id="pdf-nav">
            <button class="btn btn-nav" id="prevBtn" onclick="changePage(-1)"> &larr; </button>
            <span id="page-info">...</span>
            <button class="btn btn-nav" id="nextBtn" onclick="changePage(1)"> &rarr; </button>
        </div>
        <div id="nav-placeholder" style="display: none; width: 120px;"></div>

        <div style="display: flex; gap: 8px;">
            <input type="file" id="fileInput" accept="application/pdf,image/jpeg,image/png" style="display: none;" onchange="handleUpload(this)">
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">UPLOAD</button>
            <button class="btn btn-success" onclick="openNativeViewer()">VOLLBILD</button>
        </div>
    </div>

    <div class="main-layout">
        <div id="sidebar">
            <div class="sidebar-header">Archiv</div>
            <div id="file-list">
                </div>
        </div>

        <div class="viewer-area">
            <div id="error-display"></div>
            <div id="viewer-container">
                <canvas id="pdf-render"></canvas>
                <img id="image-render" alt="Vorschau">
            </div>
        </div>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null, pageNum = 1, isRendering = false, currentBlob = null, currentFileType = null;
        const canvas = document.getElementById('pdf-render');
        const ctx = canvas.getContext('2d', { alpha: false });
        const imgRender = document.getElementById('image-render');
        const pdfNav = document.getElementById('pdf-nav');
        const navPlaceholder = document.getElementById('nav-placeholder');

        const config = {
            id: 'hzsgocmulzcxllihkmmh',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6c2dvY211bHpjeGxsaWhrbW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTM0MDIsImV4cCI6MjA4Nzc4OTQwMn0.-A9neQ2MqCyYYDsyGMTrOjdjBk_UrKKP5BQIs17UFJw',
            bucket: 'test-pdfs'
        };

        function getFileType(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            if (ext === 'pdf') return 'pdf';
            if (['jpg', 'jpeg', 'png', 'webp'].includes(ext)) return 'image';
            return 'unknown';
        }

        async function fetchFiles() {
            const url = `https://${config.id}.supabase.co/storage/v1/object/list/${config.bucket}`;
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'apikey': config.key, 'Authorization': `Bearer ${config.key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prefix: "", limit: 100, sortBy: { column: 'name', order: 'asc' } })
                });
                const files = await res.json();
                renderFileList(files);
            } catch (e) { showError("Liste konnte nicht geladen werden."); }
        }

        function renderFileList(files) {
            const listContainer = document.getElementById('file-list');
            listContainer.innerHTML = '';
            const allowed = ['pdf', 'jpg', 'jpeg', 'png', 'webp'];
            const filtered = (files || []).filter(f => f.name && allowed.includes(f.name.split('.').pop().toLowerCase()));

            filtered.forEach((file) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                const type = getFileType(file.name);
                const icon = type === 'pdf' ? '📄' : '🖼️';
                item.innerHTML = `<span class="file-icon">${icon}</span><span>${file.name}</span>`;
                item.onclick = () => {
                    document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    loadFile(file.name);
                };
                listContainer.appendChild(item);
            });
        }

        async function loadFile(name) {
            const fileUrl = `https://${config.id}.supabase.co/storage/v1/object/authenticated/${config.bucket}/${name}`;
            currentFileType = getFileType(name);
            canvas.style.display = 'none';
            imgRender.style.display = 'none';
            showError('');

            try {
                const res = await fetch(fileUrl, { headers: { 'apikey': config.key, 'Authorization': `Bearer ${config.key}` } });
                const data = await res.arrayBuffer();
                currentBlob = new Blob([data]);

                if (currentFileType === 'pdf') {
                    pdfNav.style.display = 'flex';
                    navPlaceholder.style.display = 'none';
                    canvas.style.display = 'block';
                    pdfDoc = await pdfjsLib.getDocument({ data }).promise;
                    pageNum = 1; renderPage(pageNum);
                } else {
                    pdfNav.style.display = 'none';
                    navPlaceholder.style.display = 'block';
                    imgRender.style.display = 'block';
                    const objectUrl = URL.createObjectURL(currentBlob);
                    imgRender.src = objectUrl;
                    imgRender.onload = () => URL.revokeObjectURL(objectUrl);
                }
                document.getElementById('viewer-container').scrollTo(0,0);
            } catch (e) { showError("Datei-Ladefehler."); }
        }

        async function handleUpload(input) {
            if (!input.files[0]) return;
            const file = input.files[0];
            const uploadUrl = `https://${config.id}.supabase.co/storage/v1/object/${config.bucket}/${file.name}`;
            const btn = document.querySelector('.btn-primary');
            const originalText = btn.innerText;
            btn.innerText = "..."; btn.disabled = true;

            try {
                const res = await fetch(uploadUrl, {
                    method: 'POST',
                    headers: { 'apikey': config.key, 'Authorization': `Bearer ${config.key}` },
                    body: file
                });
                if (!res.ok) throw new Error();
                await fetchFiles();
                alert("Upload erfolgreich!");
            } catch (e) { alert("Fehler beim Upload."); }
            finally { btn.innerText = originalText; btn.disabled = false; input.value = ''; }
        }

        async function renderPage(num) {
            if (isRendering || !pdfDoc) return;
            isRendering = true;
            try {
                const page = await pdfDoc.getPage(num);
                const viewport = page.getViewport({ scale: window.devicePixelRatio > 1 ? 1.5 : 1.2 });
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                document.getElementById('page-info').innerText = `${num} / ${pdfDoc.numPages}`;
                document.getElementById('prevBtn').disabled = (num <= 1);
                document.getElementById('nextBtn').disabled = (num >= pdfDoc.numPages);
            } catch (e) {}
            isRendering = false; pageNum = num;
        }

        function changePage(delta) {
            if (currentFileType === 'pdf' && pdfDoc) {
                const next = pageNum + delta;
                if (next >= 1 && next <= pdfDoc.numPages) {
                    renderPage(next);
                    document.getElementById('viewer-container').scrollTo(0,0);
                }
            }
        }

        function openNativeViewer() {
            if (currentBlob) {
                const type = currentFileType === 'pdf' ? 'application/pdf' : 'image/jpeg';
                const finalBlob = new Blob([currentBlob], { type: type });
                window.location.href = URL.createObjectURL(finalBlob);
            }
        }

        function showError(msg) {
            const errDiv = document.getElementById('error-display');
            errDiv.style.display = msg ? 'block' : 'none';
            errDiv.innerText = msg;
        }

        window.onload = fetchFiles;
    </script>
</body>
</html>
