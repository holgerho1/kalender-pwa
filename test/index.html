<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF Express Viewer</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #121212; font-family: sans-serif; overflow: hidden; }
        
        .toolbar { 
            height: 50px; background: #1f1f1f; display: flex; 
            align-items: center; justify-content: center; border-bottom: 1px solid #333;
        }

        button { 
            padding: 8px 20px; background: #007bff; color: white; 
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px;
        }

        /* Der Container für die PDF */
        #viewer-container { 
            height: calc(100% - 50px); width: 100%; background: #121212;
        }

        object, embed, iframe { width: 100%; height: 100%; border: none; }
        
        .loading-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #888; text-align: center;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button onclick="fetchAndDisplay()">DOKUMENT LADEN</button>
    </div>

    <div id="viewer-container">
        <div class="loading-overlay" id="status">Klicke oben auf Laden</div>
    </div>

    <script>
        async function fetchAndDisplay() {
            const status = document.getElementById('status');
            const container = document.getElementById('viewer-container');
            
            const projectID = 'hzsgocmulzcxllihkmmh';
            const apiKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6c2dvY211bHpjeGxsaWhrbW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTM0MDIsImV4cCI6MjA4Nzc4OTQwMn0.-A9neQ2MqCyYYDsyGMTrOjdjBk_UrKKP5BQIs17UFJw';
            
            // Pfad zur Datei
            const url = `https://${projectID}.supabase.co/storage/v1/object/authenticated/test-pdfs/test.pdf`;

            try {
                status.innerText = "Sichere Verbindung wird aufgebaut...";

                // 1. Datei als BLOB (Binary Large Object) laden
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'apikey': apiKey,
                        'Authorization': `Bearer ${apiKey}`
                    }
                });

                if (!response.ok) throw new Error("Zugriff nicht möglich.");

                const blob = await response.blob();
                
                // 2. Eine lokale URL für diesen Blob erstellen
                const blobUrl = URL.createObjectURL(blob);

                // 3. In einem <object> Tag anzeigen (besser als iframe für PDFs)
                // Wir fügen '#toolbar=0&navpanes=0' hinzu, damit es auf dem Handy sauberer aussieht
                container.innerHTML = `
                    <object data="${blobUrl}#view=FitH" type="application/pdf">
                        <iframe src="${blobUrl}#view=FitH"></iframe>
                    </object>
                `;

                status.style.display = 'none';

            } catch (err) {
                status.innerText = "Fehler: " + err.message;
                console.error(err);
            }
        }
    </script>
</body>
</html>
