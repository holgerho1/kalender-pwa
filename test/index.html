<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase PDF Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f4f4f9; text-align: center; }
        .controls { margin-bottom: 10px; display: flex; justify-content: center; gap: 10px; }
        input { width: 60px; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 12px 20px; font-size: 16px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #pdf-canvas { width: 100%; max-width: 800px; border: 1px solid #ccc; border-radius: 5px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="controls">
        <input type="number" id="pageNumber" value="1" min="1">
        <button onclick="loadPdf()">PDF LADEN</button>
    </div>

    <canvas id="pdf-canvas"></canvas>

    <script>
        // PDF.js Konfiguration
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Supabase Konfiguration
        const supabaseUrl = 'https://hzsgocmulzcxllihkmmh.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6c2dvY211bHpjeGxsaWhrbW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTM0MDIsImV4cCI6MjA4Nzc4OTQwMn0.-A9neQ2MqCyYYDsyGMTrOjdjBk_UrKKP5BQIs17UFJw';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function loadPdf() {
            try {
                // 1. Datei als Blob direkt über das SDK herunterladen
                // Das SDK kümmert sich um die korrekten Header und Berechtigungen
                const { data, error } = await supabase
                    .storage
                    .from('test-pdfs')
                    .download('test.pdf');

                if (error) throw error;

                // 2. Den Blob in ein ArrayBuffer umwandeln für PDF.js
                const arrayBuffer = await data.arrayBuffer();

                // 3. PDF rendern
                const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
                const pdf = await loadingTask.promise;
                
                const pageNum = parseInt(document.getElementById('pageNumber').value);
                const page = await pdf.getPage(pageNum);
                
                const canvas = document.getElementById('pdf-canvas');
                const context = canvas.getContext('2d');
                const viewport = page.getViewport({ scale: 1.5 });
                
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({
                    canvasContext: context,
                    viewport: viewport
                }).promise;

            } catch (error) {
                console.error("Fehler:", error);
                alert("Fehler: " + (error.message || "Datei konnte nicht geladen werden."));
            }
        }
    </script>
</body>
</html>
