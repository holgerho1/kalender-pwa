<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Express</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            margin: 0; padding: 0; 
            height: 100vh; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
            background: #121212; color: white;
        }
        
        .card {
            background: #1e1e1e; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
            width: 80%; max-width: 300px;
        }

        .icon { font-size: 50px; margin-bottom: 20px; }

        button { 
            width: 100%; padding: 15px; background: #007bff; color: white; 
            border: none; border-radius: 12px; font-weight: bold; 
            font-size: 16px; cursor: pointer; transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); background: #0056b3; }

        #status { margin-top: 15px; font-size: 13px; color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">📄</div>
        <button onclick="openPdfNative()">DOKUMENT ÖFFNEN</button>
        <div id="status">Bereit zum Laden</div>
    </div>

    <script>
        async function openPdfNative() {
            const status = document.getElementById('status');
            const projectID = 'hzsgocmulzcxllihkmmh';
            const apiKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6c2dvY211bHpjeGxsaWhrbW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTM0MDIsImV4cCI6MjA4Nzc4OTQwMn0.-A9neQ2MqCyYYDsyGMTrOjdjBk_UrKKP5BQIs17UFJw';
            const url = `https://${projectID}.supabase.co/storage/v1/object/authenticated/test-pdfs/test.pdf`;

            try {
                status.innerText = "Wird sicher geladen...";
                
                // 1. Datei als Blob holen
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'apikey': apiKey,
                        'Authorization': `Bearer ${apiKey}`
                    }
                });

                if (!response.ok) throw new Error("Zugriff fehlgeschlagen.");

                const blob = await response.blob();
                
                // 2. Blob-URL erstellen
                const blobUrl = URL.createObjectURL(blob);

                // 3. WICHTIG: Den Browser anweisen, die Datei zu öffnen
                // Wir erstellen einen unsichtbaren Link und "klicken" ihn
                const link = document.createElement('a');
                link.href = blobUrl;
                
                // Wir öffnen es in einem neuen Tab für volle Zoom-Funktionalität
                link.target = '_blank';
                
                // Optional: Falls du es lieber als Download willst, aktiviere das:
                // link.download = 'dokument.pdf'; 

                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                status.innerText = "Geöffnet!";

                // Speicher nach 1 Minute wieder freigeben
                setTimeout(() => URL.revokeObjectURL(blobUrl), 60000);

            } catch (err) {
                status.innerText = "Fehler: " + err.message;
                alert("Fehler: " + err.message);
            }
        }
    </script>
</body>
</html>
