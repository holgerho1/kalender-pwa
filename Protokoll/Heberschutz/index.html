<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse: PruefungHeberschutz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.4/pizzip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.45.0/docxtemplater.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background: #f0f2f5; color: #1c1e21; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); max-width: 450px; margin: 20px auto; }
        h1 { font-size: 1.2rem; margin-top: 0; color: #007bff; border-bottom: 2px solid #e1e4e8; padding-bottom: 12px; }
        #status { padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 0.9rem; background: #e7f3ff; color: #0056b3; }
        .error { background: #fff0f0 !important; color: #d32f2f !important; border: 1px solid #ffcccc; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { background: #ffffff; border: 1px solid #dee2e6; margin-bottom: 8px; padding: 10px 15px; border-radius: 8px; font-family: monospace; font-weight: 600; color: #333; display: flex; align-items: center; }
        li::before { content: "•"; color: #007bff; margin-right: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>Einfügemarken Analyse</h1>
    <div id="status">Initialisiere Bibliotheken...</div>
    <ul id="markenListe"></ul>
</div>

<script>
    // Funktion zum Warten, falls die Scripte noch laden
    const wait = (ms) => new Promise(res => setTimeout(res, ms));

    async function starteAnalyse() {
        const status = document.getElementById('status');
        const liste = document.getElementById('markenListe');
        const gefundeneTags = new Set();
        
        // Der absolute Pfad für dein Vercel-Projekt
        const dateiPfad = '/Protokoll/Heberschutz/PruefungHeberschutz.docx';

        try {
            // 1. Kurze Pause, um dem Browser Zeit für das Script-Parsing zu geben
            await wait(300);

            // 2. Strenge Prüfung auf Existenz der Bibliotheken
            if (typeof window.PizZip !== 'function') {
                throw new Error("PizZip konnte nicht geladen werden. Bitte Seite neu laden.");
            }
            if (typeof window.docxtemplater !== 'function') {
                throw new Error("Docxtemplater konnte nicht geladen werden.");
            }

            status.textContent = "Lade Dokument: " + dateiPfad;

            // 3. Datei-Fetch
            const response = await fetch(dateiPfad);
            if (!response.ok) {
                throw new Error(`Datei nicht gefunden (404). Pfad prüfen: ${dateiPfad}`);
            }
            
            const buffer = await response.arrayBuffer();
            const zip = new window.PizZip(buffer);
            
            // 4. Parser Konfiguration
            const parser = (tag) => ({
                get: (scope) => {
                    // Steuerzeichen für Listen/Bedingungen filtern
                    if (!['#', '/', '^', '$'].includes(tag[0])) {
                        gefundeneTags.add(tag);
                    }
                    return scope[tag];
                }
            });

            const doc = new window.docxtemplater(zip, {
                parser: parser,
                paragraphLoop: true,
                linebreaks: true
            });

            // 5. Scan-Lauf
            try { 
                doc.render({}); 
            } catch (e) {
                // Leeres Rendern erzeugt oft Fehler, die wir hier ignorieren
            }

            // 6. Anzeige der Ergebnisse
            status.style.display = "none";
            
            if (gefundeneTags.size === 0) {
                const li = document.createElement('li');
                li.textContent = "Keine Marken gefunden.";
                liste.appendChild(li);
            } else {
                Array.from(gefundeneTags).sort().forEach(tag => {
                    const li = document.createElement('li');
                    li.textContent = tag; // Zeigt nur den Namen an
                    liste.appendChild(li);
                });
            }

        } catch (error) {
            status.className = "error";
            status.textContent = "❌ " + error.message;
            console.error("Detaillierter Fehler:", error);
        }
    }

    // Startet die Analyse erst, wenn das Fenster komplett bereit ist
    window.addEventListener('load', starteAnalyse);
</script>

</body>
</html>
