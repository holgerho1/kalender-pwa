<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse: PruefungHeberschutz</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; color: #333; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { font-size: 1.2rem; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 15px; }
        #status { padding: 10px; border-radius: 5px; margin-bottom: 15px; background: #e8f4fd; color: #0056b3; font-size: 0.9rem; }
        .error { background: #fde8e8 !important; color: #c81e1e !important; border: 1px solid #f8b4b4; }
        ul { list-style: none; padding: 0; }
        li { background: #fff; border: 1px solid #ddd; margin-bottom: 5px; padding: 10px; border-radius: 6px; font-family: monospace; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>Einfügemarken Analyse</h1>
    <div id="status">Lade Bibliotheken...</div>
    <ul id="markenListe"></ul>
</div>

<script>
    // Hilfsfunktion zum dynamischen Laden von Skripten
    function loadScript(url) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = url;
            script.onload = resolve;
            script.onerror = () => reject(new Error("Konnte Skript nicht laden: " + url));
            document.head.appendChild(script);
        });
    }

    async function initialisieren() {
        const status = document.getElementById('status');
        const liste = document.getElementById('markenListe');
        const gefundeneTags = new Set();
        const dateiPfad = '/Protokoll/Heberschutz/PruefungHeberschutz.docx';

        try {
            // 1. Bibliotheken nacheinander erzwingen
            status.textContent = "Lade PizZip...";
            await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.4/pizzip.min.js');
            
            status.textContent = "Lade Docxtemplater...";
            await loadScript('https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.45.0/docxtemplater.js');

            // Kurzer Check ob sie da sind
            if (!window.PizZip || !window.docxtemplater) {
                throw new Error("Bibliotheken fehlen im globalen Speicher.");
            }

            status.textContent = "Lade Dokument: PruefungHeberschutz.docx";

            // 2. Datei laden
            const response = await fetch(dateiPfad);
            if (!response.ok) throw new Error(`Datei nicht gefunden (404) unter: ${dateiPfad}`);
            
            const buffer = await response.arrayBuffer();
            const zip = new window.PizZip(buffer);
            
            // 3. Parser Logik
            const parser = (tag) => ({
                get: (scope) => {
                    if (!['#', '/', '^', '$'].includes(tag[0])) {
                        gefundeneTags.add(tag);
                    }
                    return scope[tag];
                }
            });

            const doc = new window.docxtemplater(zip, {
                parser: parser,
                paragraphLoop: true,
                linebreaks: true
            });

            // 4. Scan
            try { doc.render({}); } catch (e) {}

            // 5. Anzeige
            status.style.display = "none";
            if (gefundeneTags.size === 0) {
                liste.innerHTML = "<li>Keine Marken gefunden.</li>";
            } else {
                Array.from(gefundeneTags).sort().forEach(tag => {
                    const li = document.createElement('li');
                    li.textContent = `{${tag}}`;
                    liste.appendChild(li);
                });
            }

        } catch (error) {
            status.className = "error";
            status.textContent = "❌ " + error.message;
        }
    }

    // Start
    initialisieren();
</script>

</body>
</html>
