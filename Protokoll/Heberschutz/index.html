<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse: PruefungHeberschutz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.45.0/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.4/pizzip.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background: #fafafa; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 1.1rem; color: #333; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        ul { padding-left: 20px; color: #007bff; }
        li { margin-bottom: 8px; font-weight: bold; }
        #status { font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h1>Gefundene Marken</h1>
    <div id="status">Lese Dokument ein...</div>
    <ul id="markenListe"></ul>
</div>

<script>
    async function holeMarken() {
        const liste = document.getElementById('markenListe');
        const status = document.getElementById('status');
        const gefundeneTags = new Set();

        // Da index.html und docx im gleichen Ordner liegen:
        const dateiName = 'PruefungHeberschutz.docx';

        try {
            const response = await fetch(dateiName);
            if (!response.ok) throw new Error("Datei nicht gefunden.");
            
            const buffer = await response.arrayBuffer();
            const zip = new PizZip(buffer);

            // Parser, um Marken zu finden
            const parser = (tag) => ({
                get: (scope) => {
                    // Ignoriere Steuerbefehle wie {#..} oder {/..}
                    if (!['#', '/', '^', '$'].includes(tag[0])) {
                        gefundeneTags.add(tag);
                    }
                    return scope[tag];
                }
            });

            const doc = new window.docxtemplater(zip, {
                parser: parser,
                paragraphLoop: true,
                linebreaks: true
            });

            // "Trockenlauf" zum Sammeln der Tags
            try { doc.render({}); } catch (e) {}

            status.style.display = "none";
            
            if (gefundeneTags.size === 0) {
                liste.innerHTML = "<li>Keine Marken wie {Beispiel} gefunden.</li>";
            } else {
                Array.from(gefundeneTags).sort().forEach(tag => {
                    const li = document.createElement('li');
                    li.textContent = `{${tag}}`;
                    liste.appendChild(li);
                });
            }
        } catch (error) {
            status.textContent = "Fehler: " + error.message;
            status.style.color = "red";
        }
    }

    window.onload = holeMarken;
</script>

</body>
</html>
