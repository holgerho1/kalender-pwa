<script type="module">
    import PizZip from 'https://esm.sh/pizzip@3.1.4';
    import Docxtemplater from 'https://esm.sh/docxtemplater@3.45.0';

    async function initialisieren() {
        const status = document.getElementById('status');
        const liste = document.getElementById('markenListe');
        const gefundeneTags = new Set();
        // Datei-Pfad (absolut)
        const dateiPfad = '/Protokoll/Heberschutz/PruefungHeberschutz.docx';

        try {
            status.textContent = "Lade Datei binär...";

            // '?nocache=' + Date.now() zwingt den Browser, die Datei frisch zu laden
            const response = await fetch(dateiPfad + '?nocache=' + Date.now());
            
            if (!response.ok) throw new Error(`Datei nicht gefunden (404)`);
            
            const buffer = await response.arrayBuffer();
            
            // Erstmal schauen, ob die Datei überhaupt Daten enthält
            if (buffer.byteLength < 100) {
                throw new Error("Datei ist zu klein oder leer (LFS Link?).");
            }

            status.textContent = "Extrahiere Marken...";
            
            const zip = new PizZip(buffer);
            const doc = new Docxtemplater(zip, {
                parser: (tag) => ({
                    get: (scope) => {
                        // Marken wie {Name} sammeln, Befehle wie {#Liste} ignorieren
                        if (!['#', '/', '^', '$'].includes(tag[0])) {
                            gefundeneTags.add(tag);
                        }
                        return scope[tag];
                    }
                }),
                paragraphLoop: true,
                linebreaks: true
            });

            // Scannen
            try { doc.render({}); } catch (e) { }

            status.style.display = "none";
            if (gefundeneTags.size === 0) {
                liste.innerHTML = "<li>Keine Marken gefunden. Hast du {Klammern} im Dokument?</li>";
            } else {
                // Sortieren und anzeigen
                Array.from(gefundeneTags).sort().forEach(tag => {
                    const li = document.createElement('li');
                    li.textContent = `{${tag}}`;
                    liste.appendChild(li);
                });
            }

        } catch (error) {
            status.className = "error";
            status.textContent = "❌ " + error.message;
            console.error("Debug-Info:", error);
        }
    }

    initialisieren();
</script>
