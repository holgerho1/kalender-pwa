<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Supabase Test</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, select {
      font-size: 1.4em;
      padding: 0.3em;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      font-size: 1.4em;
      padding: 0.4em 0.8em;
      width: 100%;
      margin-top: 15px;
      box-sizing: border-box;
    }

    #log {
      background: #eee;
      padding: 10px;
      white-space: pre-wrap;
      font-family: monospace;
      border: 1px solid #ccc;
      margin-top: 30px;
    }

    hr {
      margin: 25px 0;
    }
  </style>
</head>

<body>
  <h1>Supabase Test</h1>

  <!-- FILTER -->
  <label for="filter_jahr">Filter Jahr</label>
  <input id="filter_jahr" type="number" oninput="filterAktualisieren()">

  <label for="filter_kw">Filter KW</label>
  <input id="filter_kw" type="number" oninput="filterAktualisieren()">

  <label for="filter_kz">Filter KZ</label>
  <input id="filter_kz" type="text" oninput="filterAktualisieren()">

  <hr>

  <!-- LISTE -->
  <label for="liste">Datensatz auswählen</label>
  <select id="liste" onchange="auswahlGeaendert()"></select>

  <button onclick="neu()">Neu</button>
  <button onclick="loeschen()">Löschen</button>

  <hr>

  <!-- FORMULAR -->
  <label for="eingabe_feld1">Feld1</label>
  <input id="eingabe_feld1" type="text" />

  <label for="eingabe_jahr">Jahr</label>
  <input id="eingabe_jahr" type="number" />

  <label for="eingabe_kw">Kalenderwoche</label>
  <input id="eingabe_kw" type="number" />

  <label for="eingabe_urlaub">Urlaub</label>
  <input id="eingabe_urlaub" type="number" step="0.1" />

  <label for="eingabe_urlaubgen">Urlaub (gen.)</label>
  <input id="eingabe_urlaubgen" type="number" step="0.1" />

  <label for="eingabe_krank">Krank</label>
  <input id="eingabe_krank" type="number" step="0.1" />

  <label for="eingabe_krankau">Krank (AU)</label>
  <input id="eingabe_krankau" type="number" step="0.1" />

  <label for="eingabe_ueber">Überstunden</label>
  <input id="eingabe_ueber" type="number" step="0.1" />

  <label for="eingabe_bereit">Bereitschaft</label>
  <input id="eingabe_bereit" type="number" step="0.1" />

  <!-- NEU: Mitarbeiter-Auswahl statt Textfeld -->
  <label for="eingabe_kz">Mitarbeiter</label>
  <select id="eingabe_kz">
    <option value="">-- bitte wählen --</option>
  </select>

  <button onclick="speichern()">Speichern</button>

  <!-- LOG -->
  <div id="log"></div>

  <!-- Supabase + App -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
