<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Mitarbeiter verwalten</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      font-size: 1.4em;
      padding: 0.3em;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      font-size: 1.4em;
      padding: 0.4em 0.8em;
      width: 100%;
      margin-top: 15px;
      box-sizing: border-box;
    }

    #liste li {
      padding: 10px;
      border-bottom: 1px solid #ccc;
      cursor: pointer;
    }

    #liste li:hover {
      background: #eef;
    }

    #log {
      background: #eee;
      padding: 10px;
      white-space: pre-wrap;
      font-family: monospace;
      border: 1px solid #ccc;
      margin-top: 30px;
    }

    hr {
      margin: 25px 0;
    }
  </style>
</head>

<body>
  <h1>Mitarbeiter verwalten</h1>

  <!-- ZURÜCK -->
  <button onclick="window.location.href='index.html'">
    Zurück zur Hauptseite
  </button>

  <hr>

  <!-- LISTE -->
  <label>Mitarbeiter auswählen</label>
  <ul id="liste" style="list-style:none; padding:0; margin:0;"></ul>

  <button onclick="neu()">Neu</button>
  <button onclick="loeschen()">Löschen</button>

  <hr>

  <!-- FORMULAR -->
  <label for="eingabe_kuerzel">Kürzel</label>
  <input id="eingabe_kuerzel" type="text" />

  <label for="eingabe_name">Name</label>
  <input id="eingabe_name" type="text" />

  <button onclick="speichern()">Speichern</button>

  <div id="log"></div>

  <!-- Supabase + JS -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script type="module" src="mitarbeiter.js"></script>
</body>
</html>
